<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanjana Injamuri — Portfolio</title>
    <meta name="description" content="Sanjana Sri Injamuri — MS CS student at Northeastern Khoury College, building secure full-stack systems (DocLink, MedLink) and exploring computational neuroscience." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sanjana Injamuri — Portfolio" />
    <meta property="og:description" content="MS CS student at Northeastern Khoury College, building secure full-stack systems (DocLink, MedLink) and exploring computational neuroscience." />
    <meta property="og:url" content="https://sanjanainjamuri.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sanjana Injamuri — Portfolio" />
    <meta name="twitter:description" content="MS CS student at Northeastern Khoury College, building secure full-stack systems (DocLink, MedLink) and exploring computational neuroscience." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%230A0B0D'/><text x='32' y='45' font-family='Georgia,serif' font-size='38' font-weight='700' fill='%23AEB7C4' text-anchor='middle'>S</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ════════════════════ GUNMETAL — THEME TOKENS ════════════════════ */
        :root{
            --display:'Syne',sans-serif;
            --body:'Instrument Sans',sans-serif;
            --mono:'JetBrains Mono',monospace;
            --r:20px;
            --maxw:1100px;
        }
        [data-theme="dark"]{
            --bg:#0A0B0D;
            --bg2:#0E1013;
            --card:#131519;
            --card-hi:rgba(255,255,255,.045);
            --border:rgba(198,208,220,.10);
            --border-hi:rgba(198,208,220,.28);
            --ink:#E9ECF1;
            --muted:#8B93A0;
            --faint:#5A626E;
            --steel:#AEB7C4;
            --sheen:linear-gradient(110deg,#8B93A1 0%,#F2F5F9 38%,#B8C0CC 55%,#788190 100%);
            --line-rgb:174,183,196;
            --glow:0 12px 40px rgba(0,0,0,.55);
            --bevel:inset 0 1px 0 rgba(255,255,255,.06);
            --meter-off:rgba(198,208,220,.12);
        }
        [data-theme="light"]{
            --bg:#E8EAED;
            --bg2:#E2E4E8;
            --card:#F4F5F7;
            --card-hi:rgba(20,22,26,.03);
            --border:rgba(20,24,30,.12);
            --border-hi:rgba(20,24,30,.32);
            --ink:#14161A;
            --muted:#4E555F;
            --faint:#8A909A;
            --steel:#3A4048;
            --sheen:linear-gradient(110deg,#3A4048 0%,#0F1114 42%,#5A626D 70%,#23272D 100%);
            --line-rgb:58,64,72;
            --glow:0 14px 40px rgba(20,24,30,.14);
            --bevel:inset 0 1px 0 rgba(255,255,255,.85);
            --meter-off:rgba(20,24,30,.10);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:var(--body);font-size:16.5px;line-height:1.66;
            color:var(--ink);background:var(--bg);
            transition:background .45s,color .45s;
            -webkit-font-smoothing:antialiased;overflow-x:hidden;
        }
        /* brushed-metal grain */
        body::before{
            content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
            background:
                    repeating-linear-gradient(92deg,transparent 0 3px,rgba(var(--line-rgb),.014) 3px 4px),
                    radial-gradient(1200px 700px at 70% -10%,rgba(var(--line-rgb),.06),transparent 60%),
                    var(--bg);
            transition:background .45s;
        }
        ::selection{background:var(--steel);color:var(--bg)}
        a{color:inherit}
        a:focus-visible,button:focus-visible{outline:2px solid var(--steel);outline-offset:3px;border-radius:8px}
        .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

        /* metallic shimmer text */
        .grad{
            background:var(--sheen);background-size:220% 100%;
            -webkit-background-clip:text;background-clip:text;color:transparent;
            animation:sheen 7s linear infinite;
        }
        @keyframes sheen{0%{background-position:0% 0}100%{background-position:220% 0}}

        /* cursor glow (desktop) */
        #cursor-glow{
            position:fixed;width:520px;height:520px;border-radius:50%;pointer-events:none;z-index:0;
            background:radial-gradient(circle,rgba(var(--line-rgb),.07),transparent 65%);
            transform:translate(-50%,-50%);left:-999px;top:-999px;transition:opacity .4s;
        }

        /* ════════════════════ INTRO — NEURAL SKETCH ════════════════════ */
        #intro{
            position:fixed;inset:0;z-index:1000;background:#08090B;
            display:flex;align-items:center;justify-content:center;cursor:pointer;
            transition:opacity .9s ease,visibility .9s;
        }
        #intro.gone{opacity:0;visibility:hidden;pointer-events:none}
        #intro canvas{position:absolute;inset:0;width:100%;height:100%}
        .intro-txt{position:relative;text-align:center;z-index:2;pointer-events:none}
        .intro-txt h1{
            font-family:var(--display);font-weight:800;letter-spacing:.32em;text-indent:.32em;
            font-size:clamp(28px,5.4vw,58px);color:#EDF0F4;
            opacity:0;transform:translateY(14px);animation:introName 1.1s .1s cubic-bezier(.2,.8,.2,1) forwards;
        }
        .intro-txt .rule{
            width:0;height:1px;margin:18px auto 14px;
            background:linear-gradient(90deg,transparent,#AEB7C4,transparent);
            animation:rule 1s .1s ease forwards;
        }
        .intro-txt p{
            font-family:var(--mono);font-size:12.5px;letter-spacing:.42em;text-indent:.42em;
            text-transform:uppercase;color:#79828F;
            opacity:0;animation:fadeIn .9s .1s ease forwards;
        }
        .intro-txt h1,.intro-txt .rule,.intro-txt p{animation-play-state:paused}
        #intro.txt-on .intro-txt h1,#intro.txt-on .intro-txt .rule,#intro.txt-on .intro-txt p{animation-play-state:running}
        @keyframes introName{to{opacity:1;transform:none}}
        @keyframes rule{to{width:min(340px,60vw)}}
        @keyframes fadeIn{to{opacity:1}}
        #skip{
            position:absolute;bottom:34px;left:50%;transform:translateX(-50%);
            font-family:var(--mono);font-size:11.5px;letter-spacing:.3em;text-transform:uppercase;
            color:#5A626E;background:none;border:1px solid rgba(174,183,196,.22);
            border-radius:999px;padding:9px 22px;cursor:pointer;transition:color .25s,border-color .25s;
        }
        #skip:hover{color:#EDF0F4;border-color:#AEB7C4}

        /* ════════════════════ NAV ════════════════════ */
        header.top{position:fixed;top:16px;left:0;right:0;z-index:100;display:flex;justify-content:center;padding:0 16px}
        .pill{
            display:flex;align-items:center;gap:2px;max-width:100%;
            background:color-mix(in srgb,var(--card) 82%,transparent);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border:1px solid var(--border);border-radius:999px;padding:7px 8px;
            box-shadow:var(--glow),var(--bevel);
            opacity:0;transform:translateY(-16px);transition:opacity .7s .15s,transform .7s .15s cubic-bezier(.2,.8,.2,1),background .45s,border-color .45s;
        }
        body.live .pill{opacity:1;transform:none}
        .pill a{font-size:13.5px;font-weight:600;text-decoration:none;color:var(--muted);
            padding:8px 16px;border-radius:999px;white-space:nowrap;transition:color .2s,background .2s;flex:none}
        .pill a:hover{color:var(--ink);background:var(--card-hi)}
        .pill a.brand{color:var(--ink);font-family:var(--display);font-weight:800;font-size:15px;letter-spacing:.02em}
        .pill a.brand i{font-style:normal;color:var(--steel)}
        .menu-btn{display:none}
        @media(max-width:640px){
            .pill a:not(.brand){display:none}
            .menu-btn{
                display:grid;place-items:center;cursor:pointer;border:1px solid var(--border);
                background:var(--card);color:var(--ink);border-radius:999px;width:36px;height:36px;
                font-size:15px;margin-left:6px;flex:none;
            }
        }
        .mobile-nav{
            position:fixed;top:70px;left:16px;right:16px;z-index:99;
            background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px;
            display:none;flex-direction:column;gap:2px;box-shadow:var(--glow),var(--bevel);
            opacity:0;transform:translateY(-10px);transition:opacity .25s,transform .25s;
        }
        .mobile-nav.open{display:flex;opacity:1;transform:none}
        .mobile-nav a{padding:13px 18px;border-radius:13px;color:var(--muted);text-decoration:none;font-weight:600;font-size:15px}
        .mobile-nav a:hover{background:var(--card-hi);color:var(--ink)}
        .theme-btn{
            cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--ink);border-radius:999px;
            width:36px;height:36px;display:grid;place-items:center;font-size:15px;margin-left:6px;
            transition:transform .35s cubic-bezier(.2,.9,.3,1.5),background .45s,border-color .25s;flex:none;
        }
        .theme-btn:hover{transform:rotate(40deg) scale(1.08);border-color:var(--border-hi)}

        /* ════════════════════ HERO ════════════════════ */
        #neurons{position:fixed;inset:0;z-index:-1;opacity:.55;transition:opacity .6s}
        .hero{min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:150px 0 90px;position:relative}
        .eyebrow{
            font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint);
            display:flex;align-items:center;gap:14px;margin-bottom:26px;
        }
        .eyebrow::before{content:"";width:44px;height:1px;background:var(--steel)}
        .hero h1{
            font-family:var(--display);font-weight:800;letter-spacing:-.02em;
            font-size:clamp(44px,8.4vw,104px);line-height:1.02;max-width:14ch;
        }
        .hero h1 .w{display:inline-block;overflow:hidden;vertical-align:bottom}
        .hero h1 .w>span{display:inline-block;transform:translateY(110%);transition:transform .9s cubic-bezier(.2,.8,.2,1)}
        body.live .hero h1 .w>span{transform:none}
        .rotator{
            margin-top:30px;font-family:var(--mono);font-size:clamp(14px,1.8vw,17px);color:var(--muted);
            display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
            opacity:0;transition:opacity .8s .7s;
        }
        body.live .rotator{opacity:1}
        .rotator .rot{position:relative;display:inline-block;min-width:16ch;height:1.5em;overflow:hidden;vertical-align:bottom}
        .rotator .rot span{
            position:absolute;left:0;top:0;color:var(--ink);font-weight:500;white-space:nowrap;
            opacity:0;transform:translateY(100%);transition:opacity .5s,transform .5s cubic-bezier(.2,.8,.2,1);
        }
        .rotator .rot span.on{opacity:1;transform:none}
        .rotator .rot span.out{opacity:0;transform:translateY(-100%)}
        .hero-links{margin-top:44px;display:flex;gap:12px;flex-wrap:wrap;opacity:0;transform:translateY(14px);transition:opacity .8s .85s,transform .8s .85s}
        body.live .hero-links{opacity:1;transform:none}
        .btn{
            position:relative;overflow:hidden;font-size:14.5px;font-weight:700;text-decoration:none;border-radius:14px;padding:14px 28px;
            transition:transform .25s cubic-bezier(.2,.9,.3,1.4),box-shadow .25s,border-color .25s;display:inline-block;
        }
        .btn::after{
            content:"";position:absolute;inset:0;
            background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);
            transform:translateX(-130%);transition:transform .6s ease;
        }
        .btn:hover{transform:translateY(-3px)}
        .btn:hover::after{transform:translateX(130%)}
        .btn.primary{background:linear-gradient(160deg,#2A2E35,#15171B);color:#EDF0F4;border:1px solid rgba(174,183,196,.28);box-shadow:var(--glow),var(--bevel)}
        [data-theme="light"] .btn.primary{background:linear-gradient(160deg,#23272D,#0F1114);color:#F2F5F9}
        .btn.ghost{background:var(--card);border:1px solid var(--border);color:var(--ink);box-shadow:var(--bevel)}
        .btn.ghost:hover{border-color:var(--border-hi)}
        .scroll-cue{
            position:absolute;bottom:34px;left:24px;font-family:var(--mono);font-size:11px;letter-spacing:.3em;
            text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:12px;
            opacity:0;transition:opacity .8s 1.2s;
        }
        body.live .scroll-cue{opacity:1}
        .scroll-cue i{display:block;width:1px;height:44px;background:var(--faint);position:relative;overflow:hidden}
        .scroll-cue i::after{content:"";position:absolute;left:0;top:-100%;width:100%;height:100%;background:var(--ink);animation:cue 1.8s ease-in-out infinite}
        @keyframes cue{60%,100%{top:100%}}

        /* ════════════════════ TICKER ════════════════════ */
        .ticker{
            border-top:1px solid var(--border);border-bottom:1px solid var(--border);
            overflow:hidden;padding:18px 0;background:var(--bg2);transition:background .45s;
            -webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);
            mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);
        }
        .ticker .track{display:flex;gap:56px;width:max-content;animation:marquee 30s linear infinite}
        .ticker:hover .track{animation-play-state:paused}
        .ticker span{font-family:var(--mono);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:56px}
        .ticker span::after{content:"◆";font-size:8px;color:var(--faint)}
        @keyframes marquee{to{transform:translateX(-50%)}}

        /* ════════════════════ SECTIONS ════════════════════ */
        section{padding:96px 0;position:relative}
        .kicker{
            font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint);
            display:flex;align-items:center;gap:14px;margin-bottom:14px;
        }
        .kicker::before{content:"";width:44px;height:1px;background:var(--steel)}
        .sec-title{font-family:var(--display);font-weight:800;letter-spacing:-.015em;font-size:clamp(30px,4.6vw,50px);margin-bottom:40px}
        .glass{
            position:relative;overflow:hidden;
            background:var(--card);border:1px solid var(--border);border-radius:var(--r);
            box-shadow:var(--bevel);transition:transform .3s,box-shadow .3s,border-color .3s,background .45s;
        }
        .glass::after{
            content:"";position:absolute;inset:0;pointer-events:none;
            background:linear-gradient(105deg,transparent 35%,rgba(var(--line-rgb),.08) 50%,transparent 65%);
            transform:translateX(-140%);transition:transform .8s ease;
        }
        .glass:hover::after{transform:translateX(140%)}
        .rv{opacity:0;transform:translateY(34px);transition:opacity .7s,transform .7s cubic-bezier(.2,.8,.25,1)}
        .rv.in{opacity:1;transform:none}
        .stagger>*{opacity:0;transform:translateY(26px);transition:opacity .6s,transform .6s cubic-bezier(.2,.8,.25,1)}
        .stagger.in>*{opacity:1;transform:none}

        /* about */
        .about-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:22px;align-items:start}
        @media(max-width:820px){.about-grid{grid-template-columns:1fr}}
        .about-card{padding:36px}
        .about-card p{color:var(--muted);margin-bottom:16px;font-size:17px}
        .about-card p strong{color:var(--ink)}
        .fact-card{padding:26px 30px}
        .fact-card div{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);font-size:14.5px}
        .fact-card div:last-child{border-bottom:none}
        .fact-card dt{color:var(--faint);font-family:var(--mono);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;padding-top:2px}
        .fact-card dd{font-weight:700;text-align:right}

        /* skills — segmented meters */
        .skill-groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
        .sg{padding:26px}
        .sg:hover{transform:translateY(-5px);border-color:var(--border-hi);box-shadow:var(--glow),var(--bevel)}
        .sg h3{font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:18px;color:var(--steel)}
        .sg .row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
        .sg .row:last-child{border-bottom:none}
        .sg .row b{font-weight:600;font-size:14.5px}
        .meter{display:flex;gap:4px}
        .meter i{width:16px;height:5px;border-radius:3px;background:var(--meter-off);transition:background .4s}
        .meter i.on{background:var(--steel)}
        .in .meter i.on{animation:tick .4s backwards}
        .meter i.on:nth-child(1){animation-delay:.15s}.meter i.on:nth-child(2){animation-delay:.3s}
        .meter i.on:nth-child(3){animation-delay:.45s}.meter i.on:nth-child(4){animation-delay:.6s}
        @keyframes tick{from{background:var(--meter-off);transform:scaleX(.3)}}

        /* building */
        .build-list{display:grid;gap:16px}
        .build{padding:30px 32px}
        .build:hover{transform:translateY(-4px);border-color:var(--border-hi);box-shadow:var(--glow),var(--bevel)}
        .build-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:baseline}
        .build h3{font-family:var(--display);font-weight:700;font-size:21px}
        .build .eta{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--faint)}
        .build p{color:var(--muted);font-size:15px;margin-top:8px;max-width:66ch}
        .bar{height:7px;border-radius:99px;background:var(--meter-off);margin-top:24px;position:relative}
        .bar i{display:block;height:100%;border-radius:99px;width:0;
            background:linear-gradient(90deg,#5A626E,#C9CED6);
            transition:width 1.4s cubic-bezier(.2,.8,.2,1)}
        .bar b{position:absolute;right:0;top:-28px;font-family:var(--mono);font-size:12.5px;color:var(--steel)}
        .build a{font-size:14px;font-weight:700;text-decoration:none;color:var(--steel);border-bottom:1px solid var(--border-hi)}

        /* projects */
        .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:26px}
        .fbtn{
            font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;cursor:pointer;
            border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:999px;padding:9px 20px;
            transition:all .2s;
        }
        .fbtn:hover{color:var(--ink);border-color:var(--border-hi)}
        .fbtn.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}
        .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
        .pcard{padding:28px 26px;display:flex;flex-direction:column;gap:13px}
        .pcard:hover{transform:translateY(-7px);border-color:var(--border-hi);box-shadow:var(--glow),var(--bevel)}
        .pcard.hide{display:none}
        .pcat{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}
        .pcard h3{font-family:var(--display);font-weight:700;font-size:20px}
        .pcard p{color:var(--muted);font-size:15px;flex:1}
        .tags{display:flex;gap:7px;flex-wrap:wrap}
        .tag{font-family:var(--mono);font-size:11.5px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:4px 10px}
        .plinks{display:flex;gap:18px}
        .plinks a{font-size:14px;font-weight:700;text-decoration:none;color:var(--steel);border-bottom:1px solid transparent;transition:border-color .2s}
        .plinks a:hover{border-color:var(--steel)}

        /* experience */
        .xp-card{padding:6px 32px}
        .xp-item{display:grid;grid-template-columns:180px 1fr;gap:24px;padding:28px 0;border-bottom:1px solid var(--border)}
        .xp-item:last-child{border-bottom:none}
        @media(max-width:680px){.xp-item{grid-template-columns:1fr;gap:6px}}
        .xp-time{font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;color:var(--faint);padding-top:5px}
        .xp-item h3{font-family:var(--display);font-weight:700;font-size:19px}
        .xp-item .org{color:var(--steel)}
        .xp-item p{color:var(--muted);margin-top:6px;font-size:15px;max-width:64ch}
        .xp-item ul{margin:10px 0 0 18px;color:var(--muted);font-size:15px}
        .xp-item li{margin-bottom:5px}

        /* publications */
        .pub-card{padding:6px 32px}
        .pub{display:grid;grid-template-columns:76px 1fr auto;gap:20px;padding:24px 0;border-bottom:1px solid var(--border);align-items:baseline}
        .pub:last-child{border-bottom:none}
        @media(max-width:680px){.pub{grid-template-columns:1fr;gap:5px}}
        .pub .year{font-family:var(--mono);font-size:13px;color:var(--steel)}
        .pub h3{font-family:var(--display);font-weight:700;font-size:18px}
        .pub .venue{font-size:14px;color:var(--muted);font-weight:600;margin-top:3px}
        .pub a{font-size:13.5px;font-weight:700;color:var(--steel);text-decoration:none;white-space:nowrap}

        /* achievements */
        .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
        .ach{padding:26px}
        .ach::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--steel),transparent)}

    /* ════ INTRO — animated neural sketch ════ */
    (function(){
        const intro=$('intro');
        $('intro-name').textContent=CONTENT.name.toUpperCase();
        $('intro-sub').textContent=CONTENT.introSub;
        if(reduced){intro.remove();document.body.classList.add('live');return;}

        const cv=$('intro-canvas'),ctx=cv.getContext('2d');
        let W,H,DPR;
        function size(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
            cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
        size();addEventListener('resize',size);

        /* two overlapping lobes of nodes — a rough hemisphere sketch */
        const nodes=[],edges=[],labels=CONTENT.tickerWords.slice(0,6);
        const cx=W/2,cy=H/2,R=Math.min(W,H)*0.30;
        function lobe(ox,n){
            for(let i=0;i<n;i++){
                const a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random())*R;
                nodes.push({x:cx+ox+Math.cos(a)*r*1.15,y:cy+Math.sin(a)*r*0.82,
                    r:1.6+Math.random()*2.2,ph:Math.random()*Math.PI*2});
            }
        }
        lobe(-R*0.42,20);lobe(R*0.42,20);
        /* connect each node to its 2 nearest neighbours */
        nodes.forEach((a,i)=>{
            const d=nodes.map((b,j)=>({j,dd:(a.x-b.x)**2+(a.y-b.y)**2}))
                .filter(o=>o.j!==i).sort((p,q)=>p.dd-q.dd).slice(0,2);
            d.forEach(o=>{const key=Math.min(i,o.j)+'-'+Math.max(i,o.j);
                if(!edges.some(e=>e.key===key))edges.push({key,a:i,b:o.j,t0:Math.random()*1700});});
        });
        /* outer nodes carry the polymath labels */
        const outer=[...nodes.keys()].sort((i,j)=>
            (Math.abs(nodes[j].x-cx)+Math.abs(nodes[j].y-cy))-(Math.abs(nodes[i].x-cx)+Math.abs(nodes[i].y-cy)))
            .slice(0,labels.length);
        /* travelling pulses */
        const pulses=Array.from({length:9},()=>({e:Math.floor(Math.random()*edges.length),
            p:Math.random(),v:0.004+Math.random()*0.006}));

        let start=null,done=false;
        function frame(ts){
            if(done)return;
            if(!start)start=ts;const t=ts-start;
            ctx.clearRect(0,0,W,H);

            /* edges sketch themselves in */
            edges.forEach(e=>{
                const p=Math.max(0,Math.min(1,(t-e.t0)/900));if(p<=0)return;
                const A=nodes[e.a],B=nodes[e.b];
                ctx.strokeStyle='rgba(174,183,196,'+(0.10+0.16*p)+')';
                ctx.lineWidth=1;
                ctx.beginPath();ctx.moveTo(A.x,A.y);
                ctx.lineTo(A.x+(B.x-A.x)*p,A.y+(B.y-A.y)*p);ctx.stroke();
            });
            /* nodes breathe */
            nodes.forEach((n,i)=>{
                const born=Math.min(...edges.filter(e=>e.a===i||e.b===i).map(e=>e.t0),1700);
                if(t<born)return;
                const glow=0.5+0.5*Math.sin(ts/700+n.ph);
                ctx.fillStyle='rgba(233,236,241,'+(0.35+0.45*glow)+')';
                ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fill();
            });
            /* signals travel after the sketch settles */
            if(t>1400)pulses.forEach(p=>{
                p.p+=p.v;if(p.p>1){p.p=0;p.e=Math.floor(Math.random()*edges.length);}
                const e=edges[p.e],A=nodes[e.a],B=nodes[e.b];
                const x=A.x+(B.x-A.x)*p.p,y=A.y+(B.y-A.y)*p.p;
                const g=ctx.createRadialGradient(x,y,0,x,y,7);
                g.addColorStop(0,'rgba(242,245,249,.9)');g.addColorStop(1,'rgba(242,245,249,0)');
                ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,7,0,7);ctx.fill();
            });
            /* domain labels fade in around the outer nodes */
            ctx.font='11px "JetBrains Mono",monospace';ctx.textAlign='center';
            outer.forEach((idx,k)=>{
                const alpha=Math.max(0,Math.min(1,(t-1900-k*120)/600));if(alpha<=0)return;
                const n=nodes[idx],above=n.y<cy;
                ctx.fillStyle='rgba(139,147,160,'+(alpha*0.9)+')';
                ctx.fillText(labels[k].toUpperCase(),n.x,n.y+(above?-14:20));
            });
            if(t>2300)intro.classList.add('txt-on');
            if(t>4600)dismiss();
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        function dismiss(){
            if(done)return;done=true;
            intro.classList.add('gone');
            document.body.classList.add('live');
            setTimeout(()=>intro.remove(),1000);

    /* ════ AMBIENT NEURON FIELD behind the page ════ */

            cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);

            pts=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,
                vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:1+Math.random()*1.6}));}

            ctx.clearRect(0,0,W,H);

            for(const p of pts){p.x+=p.vx;p.y+=p.vy;

            for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}
            requestAnimationFrame(loop);

            const c=el('div','glass sg');c.appendChild(el('h3',null,esc(gr.name)));
            gr.items.forEach(it=>{
                const r=el('div','row');r.appendChild(el('b',null,esc(it.name)));
                const m=el('div','meter');
                for(let i=1;i<=4;i++)m.appendChild(el('i',i<=it.level?'on':''));
                m.title=['','Next up','Learning','Comfortable','Expert'][it.level];
                r.appendChild(m);c.appendChild(r);
            });
            g.appendChild(c);
        });
        b.appendChild(g);
    })(shell('skills',S.skills));

    /* building */
    (b=>{if(!b)return;const list=el('div','build-list stagger');
        S.building.items.forEach(x=>{
            const c=el('div','glass build');
            const t=el('div','build-top');
            t.appendChild(el('h3',null,esc(x.name)));
            if(x.eta)t.appendChild(el('span','eta',esc(x.eta)));
            c.appendChild(t);
            if(x.desc)c.appendChild(el('p',null,esc(x.desc)));
            c.appendChild(el('div','bar',`<b>${x.progress}%</b><i data-w="${x.progress}"></i>`));
            if(x.link)c.appendChild(el('p',null,`<a href="${esc(x.link)}" ${ext(x.link)}>${esc(x.linkLabel||'Link ↗')}</a>`));
            list.appendChild(c);
        });
        b.appendChild(list);
    })(shell('building',S.building));

    /* projects */
    (b=>{if(!b)return;
        const cats=[...new Set(S.projects.items.map(p=>p.category).filter(Boolean))];
        if(cats.length){
            const f=el('div','filters');
            const mk=(label,val)=>{const btn=el('button','fbtn'+(val==='*'?' on':''),esc(label));
                btn.addEventListener('click',()=>{
                    f.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));btn.classList.add('on');
                    document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('hide',val!=='*'&&c.dataset.cat!==val));
                });return btn};
            f.appendChild(mk('All','*'));cats.forEach(c=>f.appendChild(mk(c,c)));
            b.appendChild(f);
        }
        const g=el('div','proj-grid stagger');
        S.projects.items.forEach(p=>{
            const c=el('article','glass pcard');c.dataset.cat=p.category||'';
            if(p.category)c.appendChild(el('div','pcat',esc(p.category)));
            c.appendChild(el('h3',null,esc(p.title)));
            c.appendChild(el('p',null,esc(p.desc)));
            if(p.tags&&p.tags.length){const t=el('div','tags');p.tags.forEach(tg=>t.appendChild(el('span','tag',esc(tg))));c.appendChild(t)}
            if(p.links&&p.links.length){const l=el('div','plinks');
                l.innerHTML=p.links.map(k=>`<a href="${esc(k.url)}" ${ext(k.url)}>${esc(k.label)}</a>`).join('');c.appendChild(l)}
            g.appendChild(c);
        });
        b.appendChild(g);
    })(shell('projects',S.projects));

    /* experience */
    (b=>{if(!b)return;const card=el('div','glass xp-card');
        S.experience.items.forEach(x=>{
            const r=el('article','xp-item');
            r.appendChild(el('div','xp-time',esc(x.time)));
            const d=el('div');
            d.appendChild(el('h3',null,`${esc(x.role)} · <span class="org">${esc(x.org)}</span>`));
            if(x.summary)d.appendChild(el('p',null,esc(x.summary)));
            if(x.bullets&&x.bullets.length){const ul=el('ul');x.bullets.forEach(i=>ul.appendChild(el('li',null,esc(i))));d.appendChild(ul)}
            r.appendChild(d);card.appendChild(r);
        });
        b.appendChild(card);
    })(shell('experience',S.experience));

    /* publications */
    (b=>{if(!b)return;const card=el('div','glass pub-card');
        S.publications.items.forEach(p=>{
            const r=el('article','pub');
            r.appendChild(el('div','year',esc(p.year)));
            const d=el('div');
            d.appendChild(el('h3',null,esc(p.title)));
            d.appendChild(el('div','venue',esc(p.venue)));
            r.appendChild(d);
            if(p.url&&p.url!=='#'){const a=el('a',null,'View ↗');a.href=p.url;a.target='_blank';a.rel='noopener';r.appendChild(a)}
            else r.appendChild(el('span'));
            card.appendChild(r);
        });
        b.appendChild(card);
    })(shell('publications',S.publications));

    /* achievements */
    (b=>{if(!b)return;const g=el('div','ach-grid stagger');
        S.achievements.items.forEach(a=>{const c=el('div','glass ach');
            c.appendChild(el('div','when',esc(a.when)));c.appendChild(el('h3',null,esc(a.title)));
            c.appendChild(el('p',null,esc(a.note)));g.appendChild(c)});
        b.appendChild(g);
    })(shell('achievements',S.achievements));

    /* beyond */
    (b=>{if(!b)return;const g=el('div','beyond-grid stagger');
        S.beyond.items.forEach(x=>{const c=el('div','glass bt');
            c.appendChild(el('div','emoji',esc(x.emoji)));
            const d=el('div');d.appendChild(el('h3',null,esc(x.title)));d.appendChild(el('p',null,esc(x.note)));
            c.appendChild(d);g.appendChild(c)});
        b.appendChild(g);
    })(shell('beyond',S.beyond));

    /* contact */
    $('mega').innerHTML=`<a class="grad" href="${esc(CONTENT.contact.megaLink)}">${esc(CONTENT.contact.megaText)}</a>`;
    $('socials').innerHTML=CONTENT.contact.socials.map(x=>
        `<a class="btn ${x.primary?'primary':'ghost'}" href="${esc(x.url)}" ${ext(x.url)}>${esc(x.label)}</a>`).join('');
    $('col-l').textContent=CONTENT.contact.colophonLeft;
    $('col-r').textContent=CONTENT.contact.colophonRight;

    /* nav */
    (function(){
        const n=$('nav');
        const brand=el('a','brand',`${esc(CONTENT.brand)}<i>.</i>`);brand.href='#top';n.appendChild(brand);
        const links=[];
        (CONTENT.navSections||[]).forEach(id=>{
            const cfg=S[id];if(!cfg||cfg.enabled===false||!document.getElementById(id))return;
            links.push({href:'#'+id,label:cfg.navLabel});
        });
        links.push({href:'#contact',label:'Contact'});
        links.forEach(l=>{const a=el('a',null,esc(l.label));a.href=l.href;n.appendChild(a)});

        const btn=el('button','theme-btn');btn.setAttribute('aria-label','Toggle light / dark mode');
        const sync=()=>btn.textContent=root.dataset.theme==='dark'?'☀️':'🌙';
        btn.addEventListener('click',()=>{root.dataset.theme=root.dataset.theme==='dark'?'light':'dark';sync()});
        sync();n.appendChild(btn);

        /* mobile dropdown — swaps in below 640px instead of a scrollable strip,
           since a horizontally-scrollable row of tap targets is unreliable on touch. */
        const menuBtn=el('button','menu-btn','☰');menuBtn.setAttribute('aria-label','Open menu');
        n.appendChild(menuBtn);
        const mnav=$('mobileNav');
        links.forEach(l=>{const a=el('a',null,esc(l.label));a.href=l.href;
            a.addEventListener('click',()=>mnav.classList.remove('open'));mnav.appendChild(a)});
        menuBtn.addEventListener('click',()=>mnav.classList.toggle('open'));
        document.addEventListener('click',e=>{
            if(mnav.classList.contains('open')&&!mnav.contains(e.target)&&!menuBtn.contains(e.target))
                mnav.classList.remove('open');
        });
    })();

    /* scroll reveals + stagger + progress bars */
    const io=new IntersectionObserver(es=>es.forEach(e=>{
        if(!e.isIntersecting)return;
        e.target.classList.add('in');
        e.target.querySelectorAll('.stagger').forEach(st=>{
            [...st.children].forEach((ch,i)=>ch.style.transitionDelay=(i*90)+'ms');
            st.classList.add('in');
        });
        e.target.querySelectorAll('.bar i').forEach(i=>i.style.width=i.dataset.w+'%');
        io.unobserve(e.target);
    }),{threshold:.12});
    document.querySelectorAll('.rv').forEach(x=>io.observe(x));
    if(reduced){
        document.querySelectorAll('.bar i').forEach(i=>i.style.width=i.dataset.w+'%');
        document.querySelectorAll('.stagger').forEach(s=>s.classList.add('in'));
    }
</script>
</body>
</html>
